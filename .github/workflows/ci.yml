name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --frozen
        working-directory: packages/py
      - name: Lint
        run: make lint
        working-directory: packages/py
      - name: Type check
        run: make typecheck
        working-directory: packages/py

  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: ESLint
        run: bun run lint
      - name: Type check (build all)
        run: bun run --filter '*' build

  test-py:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}
        working-directory: packages/py
      - name: Run tests with coverage
        run: uv run pytest tests/ --cov --cov-report=xml --cov-fail-under=85 --ignore=tests/unit/contrib -q
        working-directory: packages/py
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          file: packages/py/coverage.xml
          fail_ci_if_error: false

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test @urauth/ts
        run: bun test
        working-directory: packages/ts
      - name: Test @urauth/node
        run: bun test
        working-directory: packages/node
