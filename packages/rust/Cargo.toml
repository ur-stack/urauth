[package]
name = "urauth"
version = "0.1.0"
edition = "2021"
description = "Rust backend SDK for urauth — JWT, password hashing, authorization, and session management"
license = "MIT"

[dependencies]
jsonwebtoken = "9"
bcrypt = "0.16"
argon2 = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["sync", "time"] }
async-trait = "0.1"
thiserror = "2"
rand = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
