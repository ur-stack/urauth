site_name: fastapi-auth
site_description: Unified authentication & authorization for FastAPI — JWT, OAuth2, RBAC, multi-tenant in ~15 lines of setup.
site_url: https://grandmagus.github.io/fastapi-auth/
repo_url: https://github.com/grandmagus/fastapi-auth
repo_name: grandmagus/fastapi-auth

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            separate_signature: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

nav:
  - Home: index.md
  - Tutorial:
      - tutorial/index.md
      - First Steps: tutorial/first-steps.md
      - Protecting Routes: tutorial/protecting-routes.md
      - Refresh Tokens: tutorial/refresh-tokens.md
      - OAuth2 & Social Login: tutorial/oauth2-social-login.md
      - RBAC & Permissions: tutorial/rbac-permissions.md
      - Multi-Tenant: tutorial/multi-tenant.md
  - How-To Guides:
      - how-to/index.md
      - Custom Backends: how-to/custom-backends.md
      - Cookie Transport: how-to/cookie-transport.md
      - API Key Auth: how-to/api-key-auth.md
      - Sessions: how-to/sessions.md
      - CSRF Protection: how-to/csrf-protection.md
      - Testing: how-to/testing.md
      - Configuration: how-to/configuration.md
  - API Reference:
      - reference/index.md
      - FastAPIAuth: reference/fastapi-auth.md
      - AuthConfig: reference/config.md
      - Protocols: reference/protocols.md
      - Tokens: reference/tokens.md
      - Transport: reference/transport.md
      - RBAC: reference/rbac.md
      - OAuth2: reference/oauth2.md
      - Sessions: reference/sessions.md
      - Middleware: reference/middleware.md
      - Exceptions: reference/exceptions.md
      - Testing: reference/testing.md
