site_name: urauth
site_description: Framework-agnostic authentication & authorization for Python — with a first-class FastAPI adapter.
site_url: https://grandmagus.github.io/urauth/
repo_url: https://github.com/grandmagus/urauth
repo_name: grandmagus/urauth

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            separate_signature: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

nav:
  - Home: index.md
  - Tutorial:
      - tutorial/index.md
      - First Steps: tutorial/first-steps.md
      - Protecting Routes: tutorial/protecting-routes.md
      - Guards & Requirements: tutorial/guards.md
      - Access Control: tutorial/access-control.md
      - Refresh Tokens: tutorial/refresh-tokens.md
      - Pipeline: tutorial/pipeline.md
      - OAuth2 & Social Login: tutorial/oauth2-social-login.md
      - RBAC & Permissions: tutorial/rbac-permissions.md
      - Relations: tutorial/relations.md
      - Multi-Tenant: tutorial/multi-tenant.md
  - How-To Guides:
      - how-to/index.md
      - Custom Auth Subclass: how-to/custom-backends.md
      - Cookie Transport: how-to/cookie-transport.md
      - API Key Auth: how-to/api-key-auth.md
      - Sessions: how-to/sessions.md
      - Rate Limiting: how-to/rate-limiting.md
      - CSRF Protection: how-to/csrf-protection.md
      - Testing: how-to/testing.md
      - Configuration: how-to/configuration.md
  - API Reference:
      - reference/index.md
      - Auth: reference/auth.md
      - FastAuth: reference/fastauth.md
      - AuthContext: reference/context.md
      - AuthConfig: reference/config.md
      - Protocols: reference/protocols.md
      - Primitives: reference/primitives.md
      - Role Registry: reference/role-registry.md
      - Access Control: reference/access-control.md
      - Pipeline: reference/pipeline.md
      - Tokens: reference/tokens.md
      - Transport: reference/transport.md
      - Rate Limiting: reference/ratelimit.md
      - OAuth2: reference/oauth2.md
      - Sessions: reference/sessions.md
      - Middleware: reference/middleware.md
      - Exceptions: reference/exceptions.md
      - Testing: reference/testing.md
